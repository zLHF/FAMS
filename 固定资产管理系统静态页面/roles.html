<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>角色管理 - 固定资产管理系统</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark">固</div>
      <div>
        <strong>固定资产管理系统</strong>
        <small>Asset Management</small>
      </div>
    </div>
    <nav class="nav">
      <a class="" href="dashboard.html"><span></span>工作台</a>
<a class="" href="users.html"><span></span>用户管理</a>
<a class="active" href="roles.html"><span></span>角色管理</a>
<a class="" href="permissions.html"><span></span>权限管理</a>
<a class="" href="asset-params.html"><span></span>资产参数设置</a>
<a class="" href="assets.html"><span></span>固定资产台账</a>
<a class="" href="asset-distribute.html"><span></span>固定资产派发</a>
<a class="" href="asset-borrow.html"><span></span>固定资产借用</a>
<a class="" href="asset-return.html"><span></span>借用归还</a>
<a class="" href="asset-revert.html"><span></span>领用退库</a>
<a class="" href="asset-owner-change.html"><span></span>变更领用人</a>
    </nav>
  </aside>
  <main class="main">
    <header class="topbar">
      <div>
        <h1>角色管理</h1>
        <p>轻量后台页面，可直接作为前端静态模板交付后端接入。</p>
      </div>
      <div class="user-chip">管理员 admin</div>
    </header>
    <section class="toolbar">
  <div class="filters"><label>角色名称<input placeholder="请输入角色名称"></label>
<label>状态<input placeholder="启用/停用"></label></div>
  <div class="actions"><button class="btn" data-demo="查询">查询</button>
<button class="btn primary" data-modal="role">新增角色</button></div>
</section><section class="table-wrap">
  <table>
    <thead><tr><th>角色名称</th><th>角色编码</th><th>描述</th><th>状态</th><th>操作</th></tr></thead>
    <tbody><tr><td>系统管理员</td><td>ADMIN</td><td>拥有系统全部权限</td><td><span class="tag success">启用</span></td><td><button class="link-btn" type="button" data-demo="修改">修改</button> <button class="link-btn" type="button" data-demo="分配权限">分配权限</button></td></tr><tr><td>资产管理员</td><td>ASSET_MANAGER</td><td>维护资产台账和流转</td><td><span class="tag success">启用</span></td><td><button class="link-btn" type="button" data-demo="修改">修改</button> <button class="link-btn" type="button" data-demo="分配权限">分配权限</button></td></tr><tr><td>普通用户</td><td>USER</td><td>作为资产领用或借用对象</td><td><span class="tag success">启用</span></td><td><button class="link-btn" type="button" data-demo="修改">修改</button> <button class="link-btn" type="button" data-demo="分配权限">分配权限</button></td></tr></tbody>
  </table>
</section>
  </main>
  <div id="toast" class="toast" role="status"></div>
  <div id="modal" class="modal" aria-hidden="true">
    <div class="modal-panel">
      <div class="modal-head">
        <h2 id="modalTitle">操作</h2>
        <button class="icon-btn" type="button" data-close>×</button>
      </div>
      <form id="modalForm" class="form-grid"></form>
      <div class="modal-actions">
        <button class="btn ghost" type="button" data-close>取消</button>
        <button class="btn primary" type="button" data-save>保存</button>
      </div>
    </div>
  </div>
  <script src="assets/js/app.js"></script>
</body>
</html>
