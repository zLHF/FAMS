<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>登录 - 固定资产管理系统</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="login-page">
  <section class="login-shell">
    <div class="login-visual">
      <div class="brand-row">
        <div class="brand-mark">固</div>
        <div>
          <strong>固定资产管理系统</strong>
          <span>固定资产台账与流转管理</span>
        </div>
      </div>
      <h1>让资产状态、责任人和流转记录清清楚楚。</h1>
      <div class="login-stats">
        <div><b>1286</b><span>资产总数</span></div>
        <div><b>86</b><span>闲置资产</span></div>
        <div><b>42</b><span>借用中</span></div>
      </div>
    </div>
    <form class="login-card" onsubmit="event.preventDefault(); location.href='dashboard.html';">
      <h2>系统登录</h2>
      <label>账号<input value="admin" placeholder="请输入账号"></label>
      <label>密码<input type="password" value="123456" placeholder="请输入密码"></label>
      <button class="btn primary wide" type="submit">登录系统</button>
      <p class="hint">演示账号：admin / 123456。静态页面不包含真实鉴权。</p>
    </form>
  </section>
</body>
</html>
