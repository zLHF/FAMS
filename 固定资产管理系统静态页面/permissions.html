<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>权限管理 - 固定资产管理系统</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark">固</div>
      <div>
        <strong>固定资产管理系统</strong>
        <small>Asset Management</small>
      </div>
    </div>
    <nav class="nav">
      <a class="" href="dashboard.html"><span></span>工作台</a>
<a class="" href="users.html"><span></span>用户管理</a>
<a class="" href="roles.html"><span></span>角色管理</a>
<a class="active" href="permissions.html"><span></span>权限管理</a>
<a class="" href="asset-params.html"><span></span>资产参数设置</a>
<a class="" href="assets.html"><span></span>固定资产台账</a>
<a class="" href="asset-distribute.html"><span></span>固定资产派发</a>
<a class="" href="asset-borrow.html"><span></span>固定资产借用</a>
<a class="" href="asset-return.html"><span></span>借用归还</a>
<a class="" href="asset-revert.html"><span></span>领用退库</a>
<a class="" href="asset-owner-change.html"><span></span>变更领用人</a>
    </nav>
  </aside>
  <main class="main">
    <header class="topbar">
      <div>
        <h1>权限管理</h1>
        <p>轻量后台页面，可直接作为前端静态模板交付后端接入。</p>
      </div>
      <div class="user-chip">管理员 admin</div>
    </header>
    <section class="permission-layout">
  <div class="panel">
    <div class="panel-head"><h2>角色</h2></div>
    <button class="role-option active">系统管理员</button>
    <button class="role-option">资产管理员</button>
    <button class="role-option">普通用户</button>
  </div>
  <div class="panel">
    <div class="panel-head"><h2>菜单权限</h2><button class="btn primary" data-demo="保存权限">保存权限</button></div>
    <div class="tree">
      <label><input type="checkbox" checked> 工作台</label>
      <label><input type="checkbox" checked> 人员管理</label>
      <div class="tree-child">
        <label><input type="checkbox" checked> 用户管理</label>
        <label><input type="checkbox" checked> 角色管理</label>
        <label><input type="checkbox" checked> 权限管理</label>
      </div>
      <label><input type="checkbox" checked> 基础参数设置</label>
      <label><input type="checkbox" checked> 固定资产管理</label>
      <div class="tree-child">
        <label><input type="checkbox" checked> 固定资产台账</label>
        <label><input type="checkbox" checked> 固定资产派发</label>
        <label><input type="checkbox" checked> 固定资产借用</label>
        <label><input type="checkbox" checked> 借用归还</label>
        <label><input type="checkbox" checked> 领用退库</label>
        <label><input type="checkbox" checked> 变更领用人</label>
      </div>
    </div>
  </div>
</section>
  </main>
  <div id="toast" class="toast" role="status"></div>
  <div id="modal" class="modal" aria-hidden="true">
    <div class="modal-panel">
      <div class="modal-head">
        <h2 id="modalTitle">操作</h2>
        <button class="icon-btn" type="button" data-close>×</button>
      </div>
      <form id="modalForm" class="form-grid"></form>
      <div class="modal-actions">
        <button class="btn ghost" type="button" data-close>取消</button>
        <button class="btn primary" type="button" data-save>保存</button>
      </div>
    </div>
  </div>
  <script src="assets/js/app.js"></script>
</body>
</html>
